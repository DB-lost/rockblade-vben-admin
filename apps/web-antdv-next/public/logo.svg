<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rockGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a252f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bladeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#5dade2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="256" cy="256" r="240" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="2"/>
  
  <!-- 磐石 - 抽象山峰形状 -->
  <path d="M120 380 L200 260 L256 320 L340 200 L392 380 Z" 
        fill="url(#rockGradient)" 
        stroke="#1a252f" 
        stroke-width="3"/>
  
  <!-- 利刃 - 锐利切割线条 -->
  <path d="M256 320 L256 140 L290 200 L340 200 L340 160" 
        fill="none" 
        stroke="url(#bladeGradient)" 
        stroke-width="8" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- 刀刃高光 -->
  <path d="M265 150 L275 180 L300 200" 
        fill="none" 
        stroke="#85c1e9" 
        stroke-width="3" 
        stroke-linecap="round"/>
  
  <!-- RB 字样 -->
  <text x="256" y="420" 
        font-family="'Segoe UI', sans-serif" 
        font-size="48" 
        font-weight="bold" 
        fill="#2C3E50" 
        text-anchor="middle">RockBlade</text>
</svg>